<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#005da8">
  <meta name="description" content="Catálogo de bixos do universo Tokantins.">
  <title>Tokantins Bixopédia</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/to-logo.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/tokantins-logo.png" alt="Tokantins: aventura entre bixos">
        <p class="kicker">Bixopédia</p>
      </div>
      <div class="top-actions">
        <img class="mini-logo" src="assets/to-logo.png" alt="TO">
        <div class="counter" id="counter">000</div>
      </div>
    </header>

    <section class="controls" aria-label="Controles da Bixopédia">
      <label class="search">
        <span>Buscar</span>
        <input id="searchInput" type="search" placeholder="Nome ou número">
      </label>
      <label class="filter">
        <span>Região</span>
        <select id="regionFilter"></select>
      </label>
    </section>

    <section class="stats" id="statsPanel" aria-label="Resumo da Bixopédia"></section>

    <section class="layout">
      <aside class="list-panel">
        <div class="list-head">
          <strong>Catálogo</strong>
          <span id="visibleCount">0 bixos</span>
        </div>
        <div class="bixo-list" id="bixoList"></div>
      </aside>

      <section class="detail-panel" id="detailPanel" aria-live="polite"></section>
    </section>
  </main>

  <template id="emptyArtTemplate">
    <div class="empty-art">
      <span>Sem arte</span>
    </div>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
