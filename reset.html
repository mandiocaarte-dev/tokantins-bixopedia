<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Atualizar Bixopédia</title>
  <style>
    :root {
      color-scheme: light;
      --blue: #005da8;
      --orange: #ff8300;
      --ink: #17212a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: linear-gradient(180deg, var(--blue), #fff 52%, var(--orange));
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(420px, calc(100% - 32px));
      padding: 22px;
      border: 1px solid rgba(0, 93, 168, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 45px rgba(23, 33, 42, 0.16);
    }

    h1 {
      margin: 0 0 10px;
      color: var(--blue);
      font-family: "Segoe UI Black", "Arial Black", Arial, sans-serif;
      font-size: 1.35rem;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.45;
    }

    a {
      display: inline-grid;
      min-height: 44px;
      padding: 0 16px;
      place-items: center;
      border-radius: 7px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Atualizando</h1>
    <p id="status">Limpando a versão antiga da Bixopédia...</p>
    <a id="openApp" href="./?v=22" hidden>Abrir Bixopédia</a>
  </main>

  <script>
    const statusText = document.querySelector("#status");
    const openApp = document.querySelector("#openApp");

    async function resetApp() {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        statusText.textContent = "Pronto. Agora abra a Bixopédia de novo.";
        openApp.hidden = false;

        setTimeout(() => {
          window.location.replace("./?v=22");
        }, 1200);
      } catch (error) {
        statusText.textContent = "Nao consegui limpar automaticamente. Toque no botao abaixo para tentar abrir a versao nova.";
        openApp.hidden = false;
      }
    }

    resetApp();
  </script>
</body>
</html>
